services:
  cashsplit:
    build: .
    container_name: cashsplit
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: file:./data/cashsplit.db
      SESSION_SECRET: change-this-before-public-use
      ENCRYPTION_KEY: change-this-to-a-32-byte-hex-key
    volumes:
      - ./data:/app/data
    restart: unless-stopped